name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        shell: pwsh
        run: |
          python -c "from pathlib import Path; import py_compile; files=[Path('mouthclick/main.py'), Path('mouthclick/__main__.py'), Path('blinkclick/main.py'), *Path('mouthclick/src').glob('*.py')]; [py_compile.compile(str(file), doraise=True) for file in files]"

      - name: Run unit tests
        run: python -m unittest discover -s tests
